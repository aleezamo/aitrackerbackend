services:
  postgres-db:
    image: postgres:18.3-alpine
    container_name: postgres-db
    env_file:
      - .env
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  aitracker_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: aitracker_api
    container_name: aitracker_api
    env_file:
      - .env
    depends_on:
      - postgres-db
    restart: unless-stopped

  aitracker_dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: aitracker_dashboard
    container_name: aitracker_dashboard
    env_file:
      - .env
    depends_on:
      - aitracker_api
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - aitracker_api
      - aitracker_dashboard
    restart: unless-stopped

volumes:
  pgdata: